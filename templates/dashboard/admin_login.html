{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0f17">
    <title>Willy Admin Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-color': '#0d0f17',
                        'accent-primary': '#6d28d9',
                        'accent-secondary': '#0ea5e9',
                        'text-secondary': '#a0a5ba'
                    },
                    fontFamily: {
                        'heading': ['Outfit', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: var(--bg-color, #0d0f17);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(109, 40, 217, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-blur {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(109, 40, 217, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        .bg-blur.top-left { top: -20%; left: -10%; }
        .bg-blur.bottom-right { bottom: -20%; right: -10%; background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%); animation-delay: -10s; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 1.5rem;
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #6d28d9;
            box-shadow: 0 0 15px rgba(109, 40, 217, 0.3);
            outline: none;
        }
        .input-icon {
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s ease;
        }
        .input-glass:focus ~ .input-icon, .input-glass:not(:placeholder-shown) ~ .input-icon {
            color: #0ea5e9;
        }
        .gradient-btn {
            background: linear-gradient(135deg, #6d28d9 0%, #0ea5e9 100%);
            background-size: 200% auto;
            transition: 0.5s;
        }
        .gradient-btn:hover {
            background-position: right center;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body x-data="{ showPassword: false }">
    <div class="bg-blur top-left"></div>
    <div class="bg-blur bottom-right"></div>

    <div class="w-full max-w-md px-6 z-10">
        <!-- Back to Home -->
        <a href="{% url 'store:product_list' %}" class="inline-flex items-center gap-2 text-text-secondary hover:text-white transition-colors text-sm mb-8 group">
            <i class="fas fa-arrow-left transform group-hover:-translate-x-1 transition-transform"></i> Return to Storefront
        </a>

        <!-- Login Panel -->
        <div class="glass-panel p-8 sm:p-10 relative overflow-hidden">
            <!-- Decorative Accent line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-accent-primary to-accent-secondary"></div>
            
            <div class="text-center mb-10">
                <h1 class="text-3xl font-heading font-extrabold tracking-tight mb-2">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent-primary to-accent-secondary">WILLY</span> GATEWAY
                </h1>
                <p class="text-text-secondary text-sm font-medium">Restricted Access Protocol</p>
            </div>

            {% if form.errors %}
                <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6 flex items-start gap-3">
                    <i class="fas fa-exclamation-circle text-red-400 mt-0.5"></i>
                    <p class="text-red-300 text-sm">Please enter a correct username and password. Note that both fields may be case-sensitive.</p>
                </div>
            {% endif %}

            <form method="post" action="{% url 'dashboard:admin_login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next|default:'/dashboard/' }}">
                
                <div class="space-y-6">
                    <!-- Username / Email Field -->
                    <div class="relative">
                        <label for="id_username" class="sr-only">Admin ID</label>
                        <input type="text" name="username" id="id_username" required autofocus 
                               class="input-glass w-full rounded-xl py-4 flex pl-5 pr-12 text-sm placeholder-transparent peer"
                               placeholder="Admin ID">
                        <label for="id_username" class="absolute left-5 top-4 text-text-secondary text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-accent-secondary peer-focus:bg-[var(--bg-color)] peer-focus:px-1 peer-valid:-top-2.5 peer-valid:text-xs peer-valid:px-1 peer-valid:bg-[var(--bg-color)] rounded">
                            Admin ID (Username)
                        </label>
                        <i class="fas fa-user absolute right-5 top-1/2 -translate-y-1/2 input-icon pointer-events-none"></i>
                    </div>

                    <!-- Password Field -->
                    <div class="relative">
                        <label for="id_password" class="sr-only">Passcode</label>
                        <input :type="showPassword ? 'text' : 'password'" name="password" id="id_password" required 
                               class="input-glass w-full rounded-xl py-4 flex pl-5 pr-12 text-sm placeholder-transparent peer"
                               placeholder="Passcode">
                        <label for="id_password" class="absolute left-5 top-4 text-text-secondary text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-accent-secondary peer-focus:bg-[var(--bg-color)] peer-focus:px-1 peer-valid:-top-2.5 peer-valid:text-xs peer-valid:px-1 peer-valid:bg-[var(--bg-color)] rounded">
                            Passcode
                        </label>
                        <button type="button" @click="showPassword = !showPassword" class="absolute right-5 top-1/2 -translate-y-1/2 text-text-secondary hover:text-white transition-colors focus:outline-none">
                            <i class="fas" :class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="gradient-btn w-full text-white font-bold rounded-xl py-4 flex items-center justify-center gap-2 mt-4">
                        <span>Authenticate</span>
                        <i class="fas fa-arrow-right text-sm"></i>
                    </button>
                </div>
            </form>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-xs text-text-secondary/50 font-mono tracking-widest"><i class="fas fa-lock mr-1"></i> SECURE ENCRYPTED CONNECTION</p>
        </div>
    </div>
</body>
</html>
